<body>
    <div class="card">
        <h1 class="titulo">Titulo</h1>
        <button class="botao">Clique</button>
    </div>
    <!-- Qual display você usou no botão? No botão, eu usei "display inline-block" (propriedade padrão). Na verdade, eu usei "display" em outro elemento, o "h1". Neste, usei a propriedade "display inline".
    Por quê? Porque o comportamento padrão do "button" já faz com que seja possível mudar de tamanho e ficar lado a lado com outros elementos, enquanto o padrão do "h1" é ser "display block". Isso faz com que ele não possa ficar lado a lado com outros elementos, então precisa ser mudado. --> 
</body>
