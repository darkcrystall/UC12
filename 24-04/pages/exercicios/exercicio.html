<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício</title>
    <link rel="stylesheet" href="../../assets/styles/exercicios/exercicio.css">
</head>
<body>
    <div class="container-images">
        <div class="image-div">
            <img id="image-galaxy" class="image active" src="../../assets/images/img_galaxy.webp" alt="Imagem de uma galáxia ao lado direito, com planetas e estrelas visíveis ao redor">
            <div class="button-div">
                <button id="btn-galaxy" class="btn-action">Esconder imagem</button>
            </div>
        </div>
        <div class="image-div">
            <img id="image-planets" class="image active" src="../../assets/images/img_planets.jpg" alt="Imagem do espaço em tons violeta, com planetas e estrelas vísiveis">
            <div class="button-div">
                <button id="btn-planets" class="btn-action">Esconder imagem</button>
            </div>
        </div>
        <div class="image-div">
            <img id="image-space" class="image active" src="../../assets/images/img_space.jpg" alt="Imagem azulada do espaço, com planetas e estrelas visíveis">
            <div class="button-div">
                <button id="btn-space" class="btn-action">Esconder imagem</button>
            </div>
        </div>
    </div>
    <script src="../../assets/js/exercicios/exercicio.js"></script>
</body>
</html>
