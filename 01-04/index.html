<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="./assets/styles/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <!-- "header" é a tag de container para o cabeçalho do site. 
     Tudo o que vai no cabeçalho fica dentro dele. -->
    <header>
        <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/31167911abfcbf735110ccad91ae5c23a2b32e.png" alt="Logo do Senac">
        <!-- "nav" é a tag de container que usamos para agrupar links, a tag "a". -->
        <nav>
            <a href="https://www.senacrs.com.br/home">Escolas</a>
            <a href="https://www.senacrs.com.br/home">Cursos</a>
            <a href="https://www.senacrs.com.br/home">Serviços</a>
            <a href="https://www.senacrs.com.br/home">Institucional</a>
            <a href="https://www.senacrs.com.br/home">Contato</a>
            <a href="https://www.senacrs.com.br/home">Publicações</a>
        </nav>
        <!-- "div" é uma tag de container genérico. -->
        <div>
            <a href="">
                <i class="fa-solid fa-magnifying-glass" style="color: rgb(0, 74, 141);"></i>Pesquisar
            </a>
            <i class="fa-regular fa-user" style="color: rgb(0, 74, 141);"></i>
        </div>
    </header>
    <!-- "main" é a tag de container onde o conteúdo principal fica. -->
    <main>
        <!-- "class" permite diferenciar elementos com tags iguais e que se aplique estilos apenas nos elementos com essa classe. -->
        <div class="banner">
        </div>
        <div class="cursos">
            <div class="curso">
                <div class="curso-imagem borda-laranja">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f143275638d472ceb6db9152b7a077add8b.png" alt="Cursos de Jovem Aprendiz">
                </div>
                <h3>Jovem Aprendiz</h3>
            </div>
            <div class="curso">
                <div class="curso-imagem borda-azul">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f14b8e71fb2efce6d53771f36dfdd4f5cc3.png" alt="Cursos Livres">
                </div>
                <h3>Cursos Livres</h3>
            </div>
            <div class="curso">
                <div class="curso-imagem borda-azul">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f144ce4a548c1e29cc5c5e97883e204ea70.png" alt="Cursos Técnicos">
                </div>
                <h3>Cursos Técnicos</h3>
            </div>
            <div class="curso">
                <div class="curso-imagem borda-laranja">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f144da3ac6a9368ace9fd8ed2f9c1960848.png" alt="Cursos de Graduação">
                </div>
                <h3>Graduação</h3>
            </div>
            <div class="curso">
                <div class="curso-imagem borda-azul">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f14ab515ba56185326896c58f92b508e5f3.png" alt="Cursos de Pós-Graduação em Gestão e Administração">
                </div>
                <h3>MBA</h3>
            </div>
            <div class="curso">
                <div class="curso-imagem borda-laranja">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f147d0af9098f25a01bc4a0fd3cfc003747.png" alt="Cursos de Extensão">
                </div>
                <h3>Extensão</h3>
            </div>
            <div class="curso">
                <div class="curso-imagem borda-azul">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f14e131b7ff7d71089a94a774639208e21b.png" alt="Cursos de Idiomas">
                </div>
                <h3>Idiomas</h3>
            </div>
            <div class="curso">
                <div class="curso-imagem borda-laranja">
                    <img src="https://api.senacrs.com.br/bff/site-senac/v1/file/078f14e813ec40a211519d86bd2326548526b3.png" alt="Cursos à Distância">
                </div>
                <h3>EAD</h3>
            </div>
        </div>
    </main>
</body>
</html>
